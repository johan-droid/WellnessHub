services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8787
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8787
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8787:8787"
    volumes:
      - ./backend:/app
      - /app/node_modules
    # wrangler dev needs local volumes or persistence for D1 local db
