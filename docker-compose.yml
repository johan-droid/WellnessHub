services:
  backend:
    build:
      context: ./backend
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=development
      - PORT=8787
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8787/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8787
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8787
      - NODE_ENV=development
    depends_on:
      backend:
        condition: service_healthy
