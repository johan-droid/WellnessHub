name: Deploy to Production

on:
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # Preflight checks
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN not set"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID not set"
            exit 1
          fi
          echo "✅ Cloudflare secrets configured"

  # Backend deployment
  backend-deploy:
    name: Deploy Backend to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: preflight
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npm run lint
      
      - name: Build
        run: npm run build --if-present
      
      - name: Run migrations (best effort)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run migrate:prod || true
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
          workingDirectory: ./backend
      
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [backend-deploy]
    if: always()
    
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.backend-deploy.result }}" == "success" ]]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "message=Production deployment completed successfully!" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "message=Production deployment failed. Check logs for details." >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "${{ steps.status.outputs.status }}"
          echo "${{ steps.status.outputs.message }}"

